<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary Project - Vault of Secrets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        magic: ['Cinzel', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                        journal: ['Dancing Script', 'cursive']
                    },
                    boxShadow: {
                        'gold': '0 0 25px 3px rgba(245, 158, 11, 0.3)',
                        'magical': '0 0 50px 10px rgba(139, 92, 246, 0.2)'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background: radial-gradient(circle at center, #1e113a 0%, #07040d 100%); min-height: 100vh; }
        .lid-prop { transform-origin: bottom; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s; }
        .chest-open .lid-prop { transform: translateY(-35px) rotateX(-50px) scaleY(0.75); opacity: 0.85; }
        .light-glow { opacity: 0; transition: opacity 0.6s ease; }
        .chest-open .light-glow { opacity: 1; animation: pulse-magic 2s infinite alternate; }
        @keyframes pulse-magic { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; } 100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; } }
        .notepad-paper { background-color: #fdfbf7; background-image: linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px); background-size: 100% 2.25rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.8); }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 9999px; }
    </style>
</head>
<body class="text-gray-200 antialiased font-sans overflow-x-hidden">

    <div id="auth-screen" class="fixed inset-0 bg-[#07040d] z-[100] flex flex-col items-center justify-center p-6 transition-opacity duration-700">
        <div class="max-w-md w-full bg-gradient-to-b from-purple-950/40 to-black border border-purple-900/50 rounded-2xl p-8 shadow-magical text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-amber-500/20 rounded-full blur-3xl"></div>
            <i class="fa-solid fa-feather-pointed text-4xl text-amber-500 mb-4 animate-pulse"></i>
            <h1 class="font-magic text-3xl text-amber-100 font-bold mb-2">Diary Project</h1>
            <p class="text-purple-300/60 text-sm mb-8">Secure your memories in the cloud.</p>

            <button onclick="window.loginWithGoogle()" class="w-full bg-white text-stone-900 font-semibold py-3 px-4 rounded-xl flex items-center justify-center space-x-3 hover:bg-gray-100 transition-all shadow-lg border border-stone-200">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google Logo">
                <span>Sign in with Google</span>
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden opacity-0 transition-opacity duration-700">
        <header class="p-6 flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto border-b border-purple-950/30 gap-4">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="window.goToHome()">
                <i class="fa-solid font-magic fa-feather-pointed text-2xl text-amber-500"></i>
                <span class="font-magic text-xl tracking-wider font-bold bg-gradient-to-r from-amber-400 to-amber-200 bg-clip-text text-transparent">DIARY PROJECT</span>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="text-sm text-purple-300/60 flex items-center bg-purple-950/30 px-3 py-1.5 rounded-full border border-purple-900/50">
                    <i class="fa-solid fa-user-astronaut text-amber-500 mr-2"></i>
                    <span id="current-user-display">Loading...</span>
                </div>
                <button onclick="window.logoutUser()" class="text-xs text-stone-400 hover:text-white transition-colors" title="Log Out"><i class="fa-solid fa-right-from-bracket text-lg"></i></button>
                <button onclick="window.openModal()" class="bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-semibold px-5 py-2 rounded-full shadow-gold hover:scale-105 transition-all text-sm flex items-center space-x-2">
                    <i class="fa-solid fa-plus"></i><span>New Page</span>
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 py-12 flex flex-col items-center justify-center min-h-[70vh]">
            <div id="chest-view" class="flex flex-col items-center transition-all w-full max-w-md">
                <h2 class="font-magic text-2xl md:text-3xl text-center text-amber-100/90 tracking-wide mb-2">Your Secret Archives</h2>
                <div id="chest-interactive-box" onclick="window.triggerChestOpening()" class="relative w-72 h-56 mt-8 group cursor-pointer flex flex-col items-center justify-end select-none">
                    <div class="light-glow absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 rounded-full bg-amber-500/20 blur-3xl pointer-events-none"></div>
                    <div class="lid-prop w-64 h-20 bg-gradient-to-r from-amber-800 via-amber-700 to-amber-900 rounded-t-3xl border-b-4 border-amber-950/80 relative z-20 shadow-md"></div>
                    <div class="w-64 h-32 bg-gradient-to-r from-amber-900 via-amber-800 to-amber-950 rounded-b-xl border-t-2 border-amber-600/40 relative z-10 shadow-2xl flex justify-center">
                        <div class="absolute -top-5 left-1/2 -translate-x-1/2 w-12 h-14 bg-gradient-to-br from-yellow-400 via-amber-500 to-yellow-600 border border-amber-700 rounded shadow-lg z-30 flex items-center justify-center group-hover:scale-105 transition-transform duration-300">
                            <div class="w-3 h-5 bg-stone-950 rounded-full relative flex items-center justify-center"><div class="w-1 h-3 bg-stone-950 absolute bottom-0"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="shelf-view" class="w-full hidden space-y-8 opacity-0 transition-opacity duration-500">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 pb-4 border-b border-purple-950/20">
                    <h2 class="font-magic text-3xl font-bold tracking-wide text-amber-100 flex items-center gap-3">
                        <i class="fa-solid fa-book-open text-amber-500"></i> Unlocked Vault
                    </h2>
                    <div class="flex items-center space-x-3">
                        <input type="text" id="searchBar" oninput="window.renderDiaries()" placeholder="Search..." class="bg-purple-950/30 border border-purple-900/50 rounded-full px-4 py-2 text-sm outline-none focus:border-amber-500 text-gray-200 w-48">
                        <button onclick="window.goToHome()" class="bg-purple-950/60 hover:bg-purple-900/60 border border-purple-800/40 px-4 py-2 rounded-full text-xs font-semibold tracking-wider uppercase text-amber-400/80"><i class="fa-solid fa-box-archive mr-2"></i>Seal</button>
                    </div>
                </div>
                <div id="diaries-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </main>
    </div>

      <div id="diary-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity">
        <div class="bg-gradient-to-b from-neutral-900 to-stone-950 border border-amber-900/40 rounded-2xl max-w-4xl w-full p-8 shadow-magical relative">
            <button onclick="window.closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <h3 class="font-magic text-2xl text-amber-400 mb-6 border-b border-amber-900/20 pb-4">Pen Down Your Thoughts</h3>
            <form id="diary-form" onsubmit="window.saveDiary(event)" class="space-y-6">
                <input type="text" id="diary-title" required placeholder="Title of Memory..." class="w-full bg-stone-900/80 border border-purple-950 rounded-xl px-5 py-4 text-lg text-gray-100 outline-none focus:border-amber-500">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="diary-date" required class="bg-stone-900/80 border border-purple-950 rounded-xl px-5 py-3 text-gray-100 outline-none focus:border-amber-500">
                    <div class="flex space-x-2 bg-stone-900/80 p-1 border border-purple-950 rounded-xl justify-around items-center">
                        <button type="button" onclick="window.setMood('😊', this)" class="mood-btn text-2xl p-2 rounded hover:bg-purple-900/30 scale-125 border-b-2 border-amber-500">😊</button>
                        <button type="button" onclick="window.setMood('🌟', this)" class="mood-btn text-2xl p-2 rounded hover:bg-purple-900/30">🌟</button>
                        <button type="button" onclick="window.setMood('😔', this)" class="mood-btn text-2xl p-2 rounded hover:bg-purple-900/30">😔</button>
                    </div>
                </div>

                <textarea id="diary-content" required rows="12" placeholder="Dear Diary..." class="w-full bg-stone-900/80 border border-purple-950 rounded-xl px-5 py-4 text-lg text-gray-100 outline-none focus:border-amber-500 leading-relaxed"></textarea>
                
                <button type="submit" id="save-btn" class="w-full bg-amber-600 hover:bg-amber-500 text-stone-950 font-bold py-4 rounded-xl text-lg transition-transform hover:scale-[1.01]">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i>Save to Cloud
                </button>
            </form>
        </div>
    </div>


    <div id="read-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity">
        <div class="bg-[#fdfbf7] border-4 border-amber-900/30 rounded-2xl max-w-2xl w-full shadow-2xl flex flex-col relative max-h-[85vh] overflow-y-auto">
            <div class="p-6 border-b border-stone-200 flex justify-between bg-[#f7f4ed]">
                <div>
                    <span id="read-date" class="text-xs tracking-widest text-amber-800 font-bold"></span>
                    <h3 id="read-title" class="font-magic text-2xl font-black text-stone-900"></h3>
                    <p id="read-author" class="text-xs text-stone-500 mt-1 italic"></p>
                </div>
                <button onclick="window.closeReadModal()" class="text-stone-400 hover:text-stone-800"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
            </div>
            <div class="p-8 notepad-paper min-h-[250px]"><p id="read-content" class="font-journal text-3xl leading-[2.25rem] text-stone-800 whitespace-pre-wrap"></p></div>
            <div class="p-4 bg-stone-100 flex justify-end">
                <button id="delete-btn" class="text-red-700 hover:bg-red-50 text-xs font-bold px-4 py-2 rounded-lg flex items-center"><i class="fa-solid fa-trash-can mr-1"></i> Delete</button>
            </div>
        </div>
    </div>

    <div id="share-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity">
        <div class="bg-stone-900 border border-amber-500/50 rounded-xl p-6 w-full max-w-sm text-center">
            <h3 class="text-amber-400 font-bold mb-2"><i class="fa-solid fa-users mr-2"></i>Grant View Access</h3>
            <p class="text-xs text-stone-400 mb-4">Enter the exact Google Email of the person you want to read this chapter.</p>
            <input type="email" id="share-nickname-input" placeholder="friend@gmail.com" class="w-full bg-black border border-stone-700 rounded-lg px-4 py-2 text-white text-sm mb-4 outline-none focus:border-amber-500">
            <div class="flex justify-center space-x-2">
                <button onclick="window.closeShareModal()" class="px-4 py-2 text-xs text-stone-400 hover:text-white">Cancel</button>
                <button onclick="window.confirmShare()" class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-black font-bold rounded-lg text-xs">Add Viewer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // YOUR SPECIFIC FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCMDS_q0gSfmQh9bSao6gPMvMs4wEcGW6k",
            authDomain: "diary-project-43345.firebaseapp.com",
            projectId: "diary-project-43345",
            storageBucket: "diary-project-43345.firebasestorage.app",
            messagingSenderId: "149930165756",
            appId: "1:149930165756:web:be3a8478f9de2bc0479e79"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUserEmail = null;
        let diariesData = [];
        let chosenMood = "😊";
        let sharingDiaryId = null;

        // AUTHENTICATION
        window.loginWithGoogle = () => {
            signInWithPopup(auth, provider).catch(err => alert("Login failed. Make sure your GitHub URL is added to Authorized Domains in Firebase."));
        };

        window.logoutUser = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserEmail = user.email;
                document.getElementById('current-user-display').innerText = currentUserEmail;
                document.getElementById('auth-screen').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('main-app').classList.remove('hidden');
                setTimeout(() => document.getElementById('main-app').classList.remove('opacity-0'), 50);
                fetchCloudDiaries(); 
            } else {
                currentUserEmail = null;
                document.getElementById('main-app').classList.add('hidden', 'opacity-0');
                document.getElementById('auth-screen').classList.remove('opacity-0', 'pointer-events-none');
            }
        });

        // DATABASE OPERATIONS
        async function fetchCloudDiaries() {
            try {
                const ownQuery = query(collection(db, "diaries"), where("ownerEmail", "==", currentUserEmail));
                const ownSnapshot = await getDocs(ownQuery);
                
                const sharedQuery = query(collection(db, "diaries"), where("sharedWith", "array-contains", currentUserEmail));
                const sharedSnapshot = await getDocs(sharedQuery);

                let fetchedDiaries = [];
                ownSnapshot.forEach(doc => fetchedDiaries.push({ id: doc.id, ...doc.data() }));
                sharedSnapshot.forEach(doc => {
                    if(!fetchedDiaries.find(d => d.id === doc.id)) {
                        fetchedDiaries.push({ id: doc.id, ...doc.data() });
                    }
                });

                diariesData = fetchedDiaries;
                window.renderDiaries();
            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        window.saveDiary = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving..."; btn.disabled = true;

            const newDiary = {
                title: document.getElementById('diary-title').value,
                date: document.getElementById('diary-date').value,
                mood: chosenMood,
                content: document.getElementById('diary-content').value,
                ownerEmail: currentUserEmail,
                sharedWith: [],
                timestamp: Date.now()
            };

            try {
                await addDoc(collection(db, "diaries"), newDiary);
                window.closeModal();
                fetchCloudDiaries();
            } catch (err) {
                alert("Error saving: " + err.message);
            }
            btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-2"></i>Save to Cloud`; btn.disabled = false;
        };

        window.deleteDiary = async (id) => {
            if(confirm("Burn this entry forever? This removes it from the cloud entirely.")) {
                try {
                    await deleteDoc(doc(db, "diaries", id));
                    window.closeReadModal();
                    fetchCloudDiaries();
                } catch (err) {
                    alert("Error deleting: " + err.message);
                }
            }
        };

        window.confirmShare = async () => {
            const friendEmail = document.getElementById('share-nickname-input').value.trim().toLowerCase();
            if(!friendEmail) return;

            try {
                const diaryRef = doc(db, "diaries", sharingDiaryId);
                await updateDoc(diaryRef, {
                    sharedWith: arrayUnion(friendEmail)
                });
                alert(`Success! ${friendEmail} can now see this when they log in.`);
                window.closeShareModal();
                fetchCloudDiaries();
            } catch (err) {
                alert("Error sharing: " + err.message);
            }
        };

        // UI RENDER LOGIC
        window.renderDiaries = () => {
            const grid = document.getElementById('diaries-grid');
            const searchVal = document.getElementById('searchBar').value.toLowerCase();
            grid.innerHTML = "";

            const filtered = diariesData.filter(d => 
                d.title.toLowerCase().includes(searchVal) || d.content.toLowerCase().includes(searchVal)
            );

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full p-8 text-center text-stone-500 text-sm">No diaries found in the cloud.</div>`;
                return;
            }

            filtered.sort((a,b) => b.timestamp - a.timestamp).forEach(diary => {
                const isOwner = diary.ownerEmail === currentUserEmail;
                const sharedBadge = !isOwner ? `<span class="bg-amber-500/20 text-amber-400 text-[10px] px-2 py-0.5 rounded border border-amber-500/30">Shared by ${diary.ownerEmail}</span>` : '';

                const card = document.createElement('div');
                card.className = "bg-stone-900/40 border border-purple-900/30 p-5 rounded-2xl flex flex-col justify-between group";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs text-purple-400/80">${diary.date}</span>
                            <span class="text-lg bg-purple-950/60 w-8 h-8 rounded-full flex items-center justify-center border border-purple-900/40">${diary.mood}</span>
                        </div>
                        ${sharedBadge}
                        <h4 class="font-magic font-bold text-lg text-amber-200/90 mt-2 line-clamp-1">${diary.title}</h4>
                        <p class="text-stone-400 text-xs line-clamp-2 mt-2 mb-4">${diary.content}</p>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="window.viewDiary('${diary.id}')" class="flex-grow bg-purple-950/50 hover:bg-amber-500 text-amber-300 hover:text-black py-2 rounded-xl text-xs font-bold transition-colors">Read</button>
                        ${isOwner ? `<button onclick="event.stopPropagation(); window.openShareModal('${diary.id}')" class="bg-purple-950/30 hover:bg-blue-900/50 text-blue-400 border border-purple-900/40 px-3 py-2 rounded-xl" title="Add Viewer"><i class="fa-solid fa-user-plus"></i></button>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        // EXPORTING UI FUNCTIONS
        window.triggerChestOpening = () => {
            document.getElementById('chest-interactive-box').classList.add('chest-open');
            setTimeout(() => {
                document.getElementById('chest-view').classList.add('hidden');
                document.getElementById('shelf-view').classList.remove('hidden');
                setTimeout(() => document.getElementById('shelf-view').classList.remove('opacity-0'), 50);
            }, 850);
        };

        window.goToHome = () => {
            document.getElementById('shelf-view').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('shelf-view').classList.add('hidden');
                document.getElementById('chest-view').classList.remove('hidden');
                document.getElementById('chest-interactive-box').classList.remove('chest-open');
            }, 400);
        };

        window.openModal = () => document.getElementById('diary-modal').classList.remove('pointer-events-none', 'opacity-0');
        window.closeModal = () => { document.getElementById('diary-modal').classList.add('opacity-0', 'pointer-events-none'); document.getElementById('diary-form').reset(); };
        
        window.setMood = (m, btnElement) => { 
            chosenMood = m; 
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('scale-125', 'border-b-2', 'border-amber-500'));
            btnElement.classList.add('scale-125', 'border-b-2', 'border-amber-500');
        };

        window.viewDiary = (id) => {
            const entry = diariesData.find(d => d.id === id);
            if (!entry) return;

            document.getElementById('read-title').innerText = entry.title;
            document.getElementById('read-content').innerText = entry.content;
            document.getElementById('read-date').innerText = entry.date;
            document.getElementById('read-author').innerText = entry.ownerEmail === currentUserEmail ? "Written by you" : `Written by ${entry.ownerEmail}`;

            const delBtn = document.getElementById('delete-btn');
            if (entry.ownerEmail !== currentUserEmail) {
                delBtn.classList.add('hidden');
            } else {
                delBtn.classList.remove('hidden');
                delBtn.onclick = () => window.deleteDiary(id);
            }
            document.getElementById('read-modal').classList.remove('pointer-events-none', 'opacity-0');
        };

        window.closeReadModal = () => document.getElementById('read-modal').classList.add('opacity-0', 'pointer-events-none');
        
        window.openShareModal = (id) => {
            sharingDiaryId = id;
            document.getElementById('share-modal').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('share-nickname-input').value = "";
        };
        window.closeShareModal = () => {
            sharingDiaryId = null;
            document.getElementById('share-modal').classList.add('opacity-0', 'pointer-events-none');
        };

        document.getElementById('diary-date').valueAsDate = new Date();
    </script>
</body>
</html>
